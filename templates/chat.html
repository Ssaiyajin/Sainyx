<!DOCTYPE html>
<html>
<head>
    <title>Sainyx</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0d0d0d;
            color: #00ff88;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            text-shadow: 0 0 10px #00ff88;
        }
        #chat-box {
            background: #1a1a1a;
            border: 1px solid #00ff88;
            border-radius: 8px;
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
        }
        .msg { margin: 10px 0; line-height: 1.5; }
        .user { color: #fff; }
        .bot { color: #00ff88; }
        #input-area { display: flex; gap: 10px; }
        #user-input {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #00ff88;
            color: #fff;
            border-radius: 6px;
            font-family: inherit;
        }
        button {
            padding: 12px 24px;
            background: #00ff88;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>⚡ SAINYX ⚡</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Talk to Sainyx..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `<div class="msg user">You: ${message}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();

            chatBox.innerHTML += `<div class="msg bot">Sainyx: ${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
