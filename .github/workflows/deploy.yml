name: Deploy to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "deploy@sainyx.ai"
          git config user.name "Sainyx Deploy"
          git remote add hf https://ssaiyajin:$HF_TOKEN@huggingface.co/spaces/ssaiyajin/Sainyx
          git push hf main:main --force